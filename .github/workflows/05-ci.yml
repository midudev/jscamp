name: 05 - CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Preparar pnpm
        uses: pnpm/action-setup@v6
        with: 
          version: 11
          run_install: false

      - name: Instalar dependencias
        run: |
          cd 09-ci-cd
          echo "::group::Instalar dependencias"
          pnpm install --frozen-lockfile


      - name: Lint
        run: |
          cd 09-ci-cd
          echo "::group::Lint"
          pnpm lint:frontend
          echo "::endgroup::"

  frontend-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Preparar pnpm
        uses: pnpm/action-setup@v6
        with: 
          version: 11
          run_install: false

      - name: Instalar dependencias
        run: |
          cd 09-ci-cd
          echo "::group::Instalar dependencias"
          pnpm install --frozen-lockfile

      - name: Test
        run: |
          cd 09-ci-cd
          echo "::group::Test"
          pnpm test:frontend
          echo "::endgroup::"

  backend-lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Preparar pnpm
        uses: pnpm/action-setup@v6
        with: 
          version: 11
          run_install: false

      - name: Instalar dependencias
        run: |
          cd 09-ci-cd
          echo "::group::Instalar dependencias"
          pnpm install --frozen-lockfile

      - name: Lint
        run: |
          cd 09-ci-cd
          echo "::group::Lint"
          pnpm lint:backend
          echo "::endgroup::"

  backend-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Preparar pnpm
        uses: pnpm/action-setup@v6
        with: 
          version: 11
          run_install: false

      - name: Instalar dependencias
        run: |
          cd 09-ci-cd
          echo "::group::Instalar dependencias"
          pnpm install --frozen-lockfile

      - name: Test
        run: |
          cd 09-ci-cd
          echo "::group::Test"
          pnpm test:backend
          echo "::endgroup::"